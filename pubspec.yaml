name: xxo25
description: "Flutter app"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  http: ^1.1.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  url_launcher: ^6.2.6
  lottie: ^3.1.2
  wifi_iot: ^0.3.19
  fluttertoast: ^8.2.8
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0
  carousel_slider: ^4.2.1
  web_socket_channel: ^2.4.0
  network_info_plus: ^4.1.0
  permission_handler: ^11.0.0
  video_player: ^2.9.2
  font_awesome_flutter: ^10.7.0
  path_provider: ^2.1.3
  share_plus: ^7.0.2
  chewie: ^1.7.5
  geolocator: ^12.0.0
  flutter_foreground_task: ^8.0.0
  local_auth: ^2.3.0
  camera: ^0.11.0+2
  audioplayers: ^6.1.0
  in_app_update: ^4.2.5
  package_info_plus: ^8.0.2
  open_filex: ^4.4.0
  torch_light: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.jpg
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.jpg
    - assets/images/logo.png
    - assets/images/reze.png
    - assets/videos/landing.mp4
    - assets/videos/splash.mp4
    - assets/videos/banner.mp4

  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/Orbitron-Regular.ttf
    - family: ShareTechMono
      fonts:
        - asset: fonts/ShareTechMono-Regular.ttf